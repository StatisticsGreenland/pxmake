name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  r-cmd-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: 'latest'
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Install and cache dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - name: Check package
        uses: r-lib/actions/check-r-package@v2

  pxjob-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Install and cache dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, local::.
      - name: Install pxjob64Win
        run: pak::pkg_install("StatisticsGreenland/pxjob64Win", lib = .Library)
        shell: Rscript {0}
      - name: Run PxJob tests
        run: devtools::test(filter="pxjob")
        shell: Rscript {0}

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Install and cache dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint
      - name: Lint package
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  readme-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: 'latest'
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Install and cache dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, local::.
      - name: Build README
        run: devtools::build_readme()
        shell: Rscript {0}
      - name: Check README is up to date
        run: |
          if ! git diff --exit-code README.md; then
            echo "README.md and README.rmd are out of sync. Run devtools::build_readme() and commit."
            exit 1
          fi
