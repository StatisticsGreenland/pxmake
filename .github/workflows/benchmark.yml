name: Benchmark

on:
  workflow_dispatch:
    inputs:
      commit_results:
        description: 'Commit benchmark to repo'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::bench, local::.

      - name: Run benchmarks
        run: Rscript benchmarks/benchmark.R

      - name: Commit results
        if: inputs.commit_results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B benchmark-result
          git add benchmarks/benchmark.txt
          git diff --staged --quiet || git commit -m 'Update benchmark'
          git push origin benchmark-result --force
